<title>La Malédiction d'Elliott — L'Archipel des Trésors Oubliés</title>

<style>
:root{--gold:#f5c542;--sea:#0a2a4a;--dark:#061523;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);color:#e8f4ff;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100svh;}
#app{display:flex;flex-direction:column;height:100svh;}
header{background:linear-gradient(90deg,#061523,#0a2a4a,#061523);border-bottom:2px solid var(--gold);padding:6px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
h1{font-family:'Pirata One';font-size:22px;color:var(--gold);text-shadow:0 0 14px rgba(245,197,66,.5);}
h1 small{display:block;font-size:11px;color:#9dceee;font-family:'Segoe UI',sans-serif;}
#turnBox{font-family:'Pirata One';font-size:17px;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.4);padding:5px 14px;border-radius:20px;border:1px solid rgba(245,197,66,.4);}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
main{flex:1;display:grid;grid-template-columns:220px 1fr 200px;gap:6px;padding:6px;overflow:hidden;min-height:0;}
aside.side{background:rgba(10,42,74,.6);border:1px solid rgba(245,197,66,.2);border-radius:12px;padding:10px;display:flex;flex-direction:column;gap:8px;overflow:hidden;}
aside.side h2{font-family:'Pirata One';color:var(--gold);font-size:18px;border-bottom:1px solid rgba(245,197,66,.3);padding-bottom:6px;}
#log{flex:1;overflow-y:auto;font-size:12px;line-height:1.5;display:flex;flex-direction:column;gap:3px;}
#log div{padding:3px 5px;border-radius:4px;}
#log .curse{background:rgba(155,89,182,.15);border-left:2px solid #9b59b6;}
#log .bless{background:rgba(26,188,156,.15);border-left:2px solid #1abc9c;}
#log .treasure{background:rgba(245,197,66,.12);border-left:2px solid var(--gold);}
#log .combat{background:rgba(231,76,60,.15);border-left:2px solid #e74c3c;}
#diceArea{display:flex;flex-direction:column;gap:8px;}
.die3d{width:64px;height:64px;background:linear-gradient(145deg,#1a4a7a,#0d2a46);border:2px solid var(--gold);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 4px 0 #8a6500,0 6px 16px rgba(0,0,0,.5);transition:transform .1s;}
.die3d.rolling{animation:shake .3s ease-in-out infinite;}
.die3d.specialDie{border-color:#1abc9c;box-shadow:0 4px 0 #0d7a5a;}
@keyframes shake{0%,100%{transform:rotate(-8deg);}50%{transform:rotate(8deg);}}
#deckDisplay{display:flex;gap:6px;}
.deckPile{flex:1;padding:5px 6px;border-radius:8px;text-align:center;font-size:10.5px;line-height:1.5;cursor:pointer;}
.curse-deck{background:rgba(155,89,182,.2);border:1px solid #9b59b6;color:#d6a8ec;}
.bless-deck{background:rgba(26,188,156,.2);border:1px solid #1abc9c;color:#9deedf;}
.deckPile .dc{font-family:'Pirata One';font-size:16px;}
#boardWrap{position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}

#compass{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:42%;pointer-events:none;background:rgba(6,21,35,.7);border-radius:50%;padding:16px;border:2px solid rgba(245,197,66,.3);}
#compass .star{color:var(--gold);font-size:22px;}
#compass h3{font-family:'Pirata One';color:var(--gold);font-size:16px;margin:4px 0;}
#compass p{font-size:10px;color:#9dceee;line-height:1.4;}
.cell{position:absolute;transform:translate(-50%,-50%);width:40px;height:40px;border-radius:8px;border:none;background:transparent;display:flex;align-items:center;justify-content:center;cursor:default;transition:box-shadow .2s;z-index:2;}
.cell.cur{box-shadow:0 0 0 3px var(--gold),0 0 20px var(--gold);z-index:3;}
.cell .lbl{display:none;}
.cell>span:not(.num){display:none;}
.cell .num{display:none;}




.cell.shop{background:rgba(52,152,219,.25);border-color:#3498db;}


.cell.habit{background:rgba(46,204,113,.25);border-color:#2ecc71;}
.ship{position:absolute;width:30px;height:30px;transform:translate(-50%,-50%);border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid currentColor;z-index:4;transition:left .35s,top .35s;background:rgba(0,0,0,.75);box-shadow:0 0 10px currentColor,0 2px 6px rgba(0,0,0,.8);}
#helpSide{font-size:12px;overflow-y:auto;}
#posPanel{display:flex;flex-direction:column;gap:6px;}
.pos-card{border-radius:10px;border:2px solid var(--pc,#fff);padding:7px 9px;background:rgba(0,0,0,.4);}
.pos-card.active-pc{background:rgba(255,255,255,.08);box-shadow:0 0 12px var(--pc,#fff);}
.pos-name{font-family:'Pirata One';font-size:13px;color:var(--pc,#fff);}
.pos-case{font-size:11px;opacity:.85;margin-top:2px;}
.pos-case b{font-size:13px;}
#helpSide h2{font-size:16px;}
#activePanel{line-height:1.6;}
.legend{font-size:11px;line-height:1.8;}
button{background:linear-gradient(145deg,#c9900a,#8a6500);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-family:'Pirata One';font-size:18px;cursor:pointer;box-shadow:0 4px 0 #5a4000,0 6px 12px rgba(0,0,0,.4);transition:filter .1s,transform .1s,box-shadow .1s;width:100%;}
button:hover{filter:brightness(1.1);}
button:active{transform:translateY(3px);box-shadow:0 1px 0 #5a4000;}
button:disabled{filter:grayscale(.7);opacity:.6;cursor:not-allowed;}
button.sec{background:linear-gradient(145deg,#3a6ea5,#234c78);box-shadow:0 4px 0 #142d4a;}
button.danger{background:linear-gradient(145deg,#e74c3c,#a93226);box-shadow:0 4px 0 #6e1d14;}
button.power{background:linear-gradient(145deg,#8e44ad,#5b2c6f);box-shadow:0 4px 0 #3a1a4a;}
button.small{padding:6px 12px;font-size:14px;}
#mainBtn{font-size:20px;padding:11px 14px;}
#powerBtn{font-size:15px;padding:9px 12px;margin-top:4px;}
.overlay{position:fixed;inset:0;z-index:100;background:rgba(2,8,16,.8);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:16px;}
.overlay.hidden{display:none;}
.modal{background:linear-gradient(160deg,#143a5e,#08192e);border:3px solid var(--gold);border-radius:18px;padding:22px;max-width:680px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 0 50px rgba(245,197,66,.4);animation:pop .3s cubic-bezier(.3,1.5,.5,1);text-align:center;}
@keyframes pop{from{transform:scale(.6);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal h2{font-family:'Pirata One';color:var(--gold);font-size:30px;margin-bottom:8px;}
.modal p{font-size:15px;line-height:1.5;margin:8px 0;}
.modal .big{font-size:56px;margin:8px;}
.card-vis{margin:12px auto;max-width:320px;padding:16px;border-radius:12px;border:2px solid;}
.card-vis.curse{background:linear-gradient(160deg,#3a1f4f,#1a0a28);border-color:#9b59b6;color:#d6a8ec;}
.card-vis.bless{background:linear-gradient(160deg,#0d4a52,#062a30);border-color:#1abc9c;color:#9deedf;}
.card-vis h3{font-family:'Pirata One';font-size:22px;color:#fff;}
.btnrow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px;}
#setup .charpick{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.charcard{width:165px;border-radius:14px;padding:0;border:3px solid;cursor:pointer;background:rgba(0,0,0,.45);transition:transform .15s,box-shadow .15s;position:relative;text-align:center;overflow:hidden;}
.charcard:hover{transform:translateY(-4px);}
.charcard-img{width:100%;height:200px;object-fit:cover;object-position:top;display:block;}
.charcard-info{padding:8px 8px 10px;background:linear-gradient(to bottom,rgba(0,0,0,.7),rgba(0,0,0,.9));}
.charcard.sel{box-shadow:0 0 28px currentColor;transform:translateY(-7px) scale(1.03);}
.charcard .av{font-size:46px;margin-bottom:4px;}
.charcard .nm{font-family:'Pirata One';font-size:16px;line-height:1.1;}
.charcard .navname{font-size:10px;opacity:.7;margin:3px 0;}
.charcard .pw{font-size:10.5px;background:rgba(245,197,66,.12);border-radius:6px;padding:4px 6px;margin-top:5px;color:var(--gold);line-height:1.4;}
.charcard .badge{position:absolute;top:-10px;right:-10px;width:28px;height:28px;border-radius:50%;background:var(--gold);color:#3a2600;font-family:'Pirata One';display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 10px var(--gold);}
.charcard .muted{font-size:10px;color:#9dceee;margin-top:3px;}
footer{background:rgba(6,21,35,.8);border-top:2px solid rgba(245,197,66,.3);padding:6px 10px;display:flex;gap:8px;overflow-x:auto;flex-shrink:0;align-items:stretch;}
.navire{min-width:240px;flex:0 0 240px;border-radius:14px;border:2.5px solid var(--nc,#fff);background:rgba(4,12,24,.95);padding:0;transition:box-shadow .25s;position:relative;overflow:hidden;}
.navire.active{box-shadow:0 0 18px var(--nc,#fff);border-width:3px;}
.navire-banner{width:100%;height:130px;object-fit:cover;object-position:center top;display:block;border-radius:12px 12px 0 0;}
.navire.skip{opacity:.6;}
.navire.done{opacity:.5;}
.navire-top{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.navire-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;border:2px solid var(--nc,#fff);}
.navire-name{font-family:'Pirata One';font-size:12.5px;color:var(--nc,#fff);line-height:1.1;}
.navire-ship{font-size:10px;opacity:.7;margin-top:1px;}
.navire-power{font-size:9.5px;background:rgba(245,197,66,.1);border:1px solid rgba(245,197,66,.25);border-radius:5px;padding:3px 6px;color:var(--gold);margin-bottom:5px;line-height:1.3;}
.navire-res{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;}
.res{background:rgba(255,255,255,.07);border-radius:4px;padding:2px 3px;font-size:9px;text-align:center;line-height:1.3;}
.res .rv{font-family:'Pirata One';font-size:13px;}
.navire-pos{font-size:9px;opacity:.55;margin-top:4px;text-align:center;}
#fx{position:fixed;inset:0;pointer-events:none;z-index:200;}
.particle{position:absolute;font-size:22px;animation:floatUp 1.3s ease-out forwards;}
@keyframes floatUp{0%{transform:translateY(0) scale(.5);opacity:1;}100%{transform:translateY(-150px) scale(1.4) rotate(40deg);opacity:0;}}
.shopRow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 12px;margin:6px 0;background:rgba(255,255,255,.06);border-radius:9px;border:1px solid rgba(245,197,66,.25);}
.shopRow .lbl2{text-align:left;font-size:14px;}
.combatGrid{display:flex;gap:16px;justify-content:center;align-items:stretch;flex-wrap:wrap;margin:14px 0;}
.fighter{flex:1;min-width:180px;border-radius:12px;padding:12px;border:2px solid;background:rgba(0,0,0,.3);}
.fighter h3{font-family:'Pirata One';font-size:20px;}
.fighter .pw{font-size:38px;font-family:'Pirata One';color:var(--gold);margin:6px 0;}
.vs{display:flex;align-items:center;font-family:'Pirata One';font-size:38px;color:#e74c3c;}
.finalRow{display:flex;justify-content:space-between;padding:5px 10px;margin:3px 0;background:rgba(255,255,255,.06);border-radius:7px;font-size:14px;}
.finalRow.win{border:2px solid var(--gold);box-shadow:0 0 14px var(--gold);}
.muted{font-size:12px;opacity:.72;}
::-webkit-scrollbar{width:7px;}::-webkit-scrollbar-thumb{background:rgba(245,197,66,.35);border-radius:3px;}
@media(max-width:1024px){main{grid-template-columns:200px 1fr 0;}#helpSide{display:none;}}
@media(max-width:680px){
  body{overflow:auto;}#app{height:auto;min-height:100svh;}
  header{padding:5px 8px;flex-wrap:wrap;}h1{font-size:18px;}h1 small{font-size:10px;}
  #turnBox{font-size:14px;padding:4px 10px;}
  main{grid-template-columns:1fr;padding:3px;gap:3px;}
  aside.side:first-child{order:10;flex-direction:row;flex-wrap:wrap;align-items:center;padding:5px 8px;min-height:0;gap:6px;}
  aside.side:first-child h2{display:none;}aside.side:first-child #log{display:none;}
  aside.side:first-child #diceArea{flex-direction:row;width:100%;justify-content:space-between;flex-wrap:wrap;gap:6px;}
  #deckDisplay{display:none!important;}#mainBtn,#powerBtn{width:auto;font-size:16px;padding:9px 14px;}
  #helpSide{display:none;}#boardWrap{min-height:76vw;}
  #board{max-width:calc(100vw - 6px);max-height:calc(100vw - 6px);}
  .cell{width:48px;height:48px;font-size:15px;border-radius:7px;}
  .cell .lbl{font-size:5.5px;}.cell .num{font-size:6px;}
  footer{overflow-x:auto;flex-wrap:nowrap;padding:4px 5px;gap:5px;}
  .navire{min-width:148px;flex:0 0 148px;padding:6px;}
  .modal{padding:12px;max-height:88svh;}.modal h2{font-size:24px;}.modal p{font-size:13px;}.modal .big{font-size:44px;}
  .combatGrid{flex-direction:column;gap:8px;}.fighter{min-width:0;}.vs{font-size:28px;}
  button{font-size:15px;padding:9px 13px;}button.small{font-size:12px;padding:5px 9px;}
  .die3d{width:54px;height:54px;font-size:26px;}.shopRow{padding:7px 9px;}
  #setup .charpick{gap:8px;}.charcard{width:130px;padding:9px 7px;}.charcard .av{font-size:38px;}.charcard .nm{font-size:13px;}
}
button{touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>La Malédiction d'Elliott<small>L'Archipel des Trésors Oubliés</small></h1>
    <div id="turnBox" style="color:#9B59B6"><span class="dot" style="background:#9B59B6"></span><span id="turnName">—</span></div>
  </header>
  <main>
    <aside class="side">
      <h2>Journal de Bord</h2>
      <div id="log"></div>
      <div id="diceArea">
        <div style="display:flex;gap:8px;">
          <div class="die3d" id="dieNum">🎲</div>
          <div class="die3d specialDie" id="dieSpecial">Dé♟</div>
        </div>
        <div id="deckDisplay">
          <div class="deckPile curse-deck" onclick="peekDeck('curse')">☠️ Malédictions<br><span class="dc" id="curseCount">10</span></div>
          <div class="deckPile bless-deck" onclick="peekDeck('favor')">🔱 Faveurs<br><span class="dc" id="favorCount">10</span></div>
        </div>
        <button id="mainBtn" onclick="onMainBtn()">Lancer les Dés</button>
        <button id="powerBtn" onclick="onPowerBtn()" class="power" style="display:none">⚡ Pouvoir</button>
      </div>
    </aside>
    <section id="boardWrap">
      <div id="board">
        <div id="compass">
          <div class="star">✦</div>
          <h3>L'Archipel</h3>
          <p id="compassMsg">48 îles — retour au port avec le plus de butin !</p>
        </div>
      </div>
    </section>
    <aside class="side" id="helpSide">
      <h2>Positions</h2>
      <div id="posPanel"></div>
      <div id="activePanel" style="display:none"></div>
    </aside>
  </main>
  <footer id="footer"></footer>
</div>
<div id="fx"></div>
<button id="logToggle" onclick="toggleMobileLog()" style="display:none;position:fixed;bottom:14px;left:14px;z-index:80;font-size:17px;padding:9px 13px;border-radius:50%;width:50px;height:50px;">📋</button>
<div id="mobileLog" style="display:none;position:fixed;inset:0;z-index:90;background:rgba(2,8,16,.93);padding:14px;overflow-y:auto;flex-direction:column;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <span style="font-family:'Pirata One';font-size:20px;color:var(--gold);">Journal de Bord</span>
    <button onclick="toggleMobileLog()" class="danger small">✕</button>
  </div>
  <div id="mobileLogContent" style="font-size:12px;line-height:1.5;"></div>
</div>
<div class="overlay hidden" id="overlay"><div class="modal" id="modal"></div></div>

const TREASURES=[
  {key:"diamant",n:"Diamant des Caraïbes",e:"💎",pts:5},
  {key:"relique",n:"Relique Ancienne",e:"🏺",pts:4},
  {key:"artefact",n:"Artefact Aztèque",e:"🗿",pts:6,curse:true},
  {key:"perles",n:"Perles Noires",e:"⚫",pts:2,multi:true},
  {key:"coffre",n:"Coffre de Doublons",e:"🪙",pts:3,gold:3},
  {key:"carte",n:"Carte au Trésor",e:"🗺️",pts:1,jump:true}
];
let players=[],cur=0,curseDeck=[],favorDeck=[],busy=false,gameOver=false,ghostLoot=[];
const TRACK=48;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function rebuildDecks(){curseDeck=shuffle(CURSES);favorDeck=shuffle(FAVORS);}
function drawCurse(){if(!curseDeck.length)curseDeck=shuffle(CURSES);return curseDeck.shift();}
function drawFavor(){if(!favorDeck.length)favorDeck=shuffle(FAVORS);return favorDeck.shift();}
function updateDeckCounts(){const cc=document.getElementById('curseCount'),fc=document.getElementById('favorCount');if(cc)cc.textContent=curseDeck.length||'♻';if(fc)fc.textContent=favorDeck.length||'♻';}
let cellPos=[];
function computeCellPositions(){cellPos=[];const R=46,n=TRACK;for(let i=0;i<n;i++){const ang=(-90+(i/n)*360)*Math.PI/180;cellPos.push({x:50+R*Math.cos(ang),y:50+R*Math.sin(ang)});}}
function buildBoard(){
  const board=document.getElementById('board');board.querySelectorAll('.cell,.ship').forEach(e=>e.remove());computeCellPositions();
  for(let i=0;i<TRACK;i++){const t=TYPES[i],info=TYPEINFO[t];const c=document.createElement('div');c.className='cell '+t;c.id='cell'+i;c.style.left=cellPos[i].x+'%';c.style.top=cellPos[i].y+'%';c.innerHTML=`<span class="num">${i}</span><span>${info.e}</span><span class="lbl">${info.l}</span>`;board.appendChild(c);}
  players.forEach(p=>{const s=document.createElement('div');s.className='ship';s.id='ship'+p.id;s.style.color=p.color;s.innerHTML=`<span style='font-size:14px;filter:drop-shadow(0 0 3px ${p.color});'>⛵</span>`;board.appendChild(s);placeShip(p);});
}

  if(kind==='curse'&&p._armorEcume){p._armorEcume=false;const card=drawCurse();log("🛡️ Armure d'Écume annule «"+card.n+"» !","bless");particles('✨',10);done();return;}
  const card=kind==='curse'?drawCurse():drawFavor();const cls=kind==='curse'?'curse':'bless';const m=document.getElementById('modal');
  const cImg=CARD_IMGS[kind==='curse'?'curses':'favors'][card.i||0];m.innerHTML=`<h2>${kind==='curse'?'☠️ Malédiction d\'Elliott':'🔱 Faveur de Poséidon'}</h2><div class="card-vis ${cls}" style="padding:0;overflow:hidden;background:none;border:none"><img src="${cImg}" alt="${card.n}" style="width:100%;max-height:340px;object-fit:contain;border-radius:12px;display:block"></div><div class="btnrow"><button id="aC">Subir le destin</button></div>`;
  showOverlay();
  document.getElementById('aC').onclick=()=>{card.f(p);if(kind==='curse'){log("☠️ "+p.name+" subit «"+card.n+"».","curse");particles('👻',7);}else{log("🔱 "+p.name+" reçoit «"+card.n+"».","bless");particles('✨',9);}placeShip(p);refreshShips();highlightCell();renderPlayers();updateDeckCounts();hideOverlay();done();};
}
function peekDeck(kind){const m=document.getElementById('modal');m.innerHTML=`<h2>${kind==='curse'?'☠️ Malédictions d\'Elliott':'🔱 Faveurs de Poséidon'}</h2><p>Cartes restantes : <b>${kind==='curse'?curseDeck.length:favorDeck.length}</b></p><p class="muted">Le deck est secret et mélangé.</p><div class="btnrow"><button id="cP">Fermer</button></div>`;showOverlay();document.getElementById('cP').onclick=()=>hideOverlay();}
function giveTreasure(p,done){const t=TREASURES[Math.random()*TREASURES.length|0];let count=1;if(t.multi)count=1+(Math.random()*3|0);let txt=`<div class="big">${t.e}</div><h3>${t.n}</h3>`;if(t.gold){p.gold+=t.gold;txt+=`<p>+${t.gold}🪙 et ${t.pts} pts !</p>`;}else if(t.multi)txt+=`<p>Vous trouvez ${count} perle(s) — ${t.pts}pts chacune !</p>`;else txt+=`<p>Vaut ${t.pts} points.</p>`;if(t.curse)txt+=`<p style="color:#d6a8ec">L'artefact est maudit...</p>`;if(t.jump)txt+=`<p>Prochain tour : saut vers l'île au trésor.</p>`;const existing=p.treasures.find(x=>x.key===t.key&&(t.multi||t.gold));if(t.multi){if(existing)existing.count+=count;else p.treasures.push({key:t.key,n:t.n,e:t.e,pts:t.pts,count});}else p.treasures.push({key:t.key,n:t.n,e:t.e,pts:t.pts,count:1});if(t.jump)p.jumpNext=true;const m=document.getElementById('modal');m.innerHTML=`<h2>💎 Trésor Oublié !</h2><div class="card-vis bless">${txt}</div><div class="btnrow"><button id="gT">Empocher</button></div>`;showOverlay();particles(t.e,14);document.getElementById('gT').onclick=()=>{log("💎 "+p.name+" récupère «"+t.n+"»"+(t.multi?" ×"+count:"")+".","treasure");if(t.curse){hideOverlay();drawAndApply('curse',p,done);}else{hideOverlay();done();}renderPlayers();};}
function openShop(p){let cannonStock=5;function render(){const m=document.getElementById('modal');m.innerHTML=`<h2>🏪 Île des Marchands</h2><p>Or : <b>🪙${p.gold}</b></p><div class="shopRow"><span class="lbl2">⚔️ Épée · +1 puissance<br><span class="muted">2🪙</span></span><button class="small sec" id="bSw" ${p.gold<2?'disabled':''}>Acheter</button></div><div class="shopRow"><span class="lbl2">💣 Canon · +3 puissance<br><span class="muted">4🪙 · stock ${cannonStock}</span></span><button class="small sec" id="bCn" ${(p.gold<4||cannonStock<=0)?'disabled':''}>Acheter</button></div><hr style="border-color:rgba(245,197,66,.3);margin:12px 0"><p class="muted">Vendre des trésors :</p><div id="sL"></div><div class="btnrow"><button id="lS" class="danger">Quitter</button></div>`;const sl=m.querySelector('#sL');const sellable=p.treasures.filter(t=>t.key!=='coffre');if(!sellable.length)sl.innerHTML='<span class="muted">Aucun trésor à vendre.</span>';sellable.forEach(t=>{const val=Math.max(1,Math.round(t.pts));const row=document.createElement('div');row.className='shopRow';row.innerHTML=`<span class="lbl2">${t.e} ${t.n}${t.count>1?' ×'+t.count:''}<br><span class="muted">1 pour ${val}🪙</span></span>`;const b=document.createElement('button');b.className='small';b.textContent='Vendre';b.onclick=()=>{p.gold+=val;if(t.count>1)t.count--;else p.treasures.splice(p.treasures.indexOf(t),1);log(p.name+" vend "+t.n+" ("+val+"🪙).");render();renderPlayers();};row.appendChild(b);sl.appendChild(row);});m.querySelector('#bSw').onclick=()=>{p.gold-=2;p.swords++;log(p.name+" achète 1⚔️ (2🪙).");render();renderPlayers();};m.querySelector('#bCn').onclick=()=>{p.gold-=4;p.cannons++;cannonStock--;log(p.name+" achète 1💣 (4🪙).");render();renderPlayers();};m.querySelector('#lS').onclick=()=>{hideOverlay();afterTile(p);};}showOverlay();render();}
function chooseCombat(p){const rivals=players.filter(o=>o!==p&&!o.done);if(!rivals.length){log("⚔️ Aucun rival.","combat");afterTile(p);return;}const m=document.getElementById('modal');m.innerHTML=`<h2>⚔️ Combat !</h2><p>${p.name} choisit un rival :</p><div class="btnrow">${rivals.map(r=>`<button class="cp danger" data-id="${r.id}" style="background:linear-gradient(145deg,${r.color},#1a0000)">${r.emoji} ${r.name}<br><span class="muted" style="color:#fff">Puissance ${power(r)}</span></button>`).join('')}</div><div class="btnrow"><button id="nF" class="sec">Renoncer</button></div>`;showOverlay();m.querySelectorAll('.cp').forEach(b=>b.onclick=()=>{const r=players.find(x=>x.id==b.dataset.id);startCombat(p,r,()=>afterTile(p));});document.getElementById('nF').onclick=()=>{hideOverlay();log(p.name+" renonce.","combat");afterTile(p);};}
function handleCollision(p,others){const group=[p,...others];if(group.length>=3){log("🏴 TRÊVE ! "+group.length+" navires sur la même case.","combat");truceModal(group,()=>afterTile(p));return;}const r=others[0];if(p.ghostShield||r.ghostShield){const prot=p.ghostShield?p:r;log("👻 "+prot.name+" est un Spectre — combat annulé !","bless");prot.ghostShield=false;afterTile(p);return;}log("⚔️ "+p.name+" croise "+r.name+" — combat !","combat");startCombat(p,r,()=>afterTile(p));}
function truceModal(group,done){let idx=0;function ask(){if(idx>=group.length){hideOverlay();done();return;}const pl=group[idx];const m=document.getElementById('modal');m.innerHTML=`<h2>🏴 Trêve</h2><p>${pl.name}, abandonnez 1 arme :</p><div class="btnrow"><button id="dS" class="sec" ${pl.swords<=0?'disabled':''}>1⚔️ (${pl.swords})</button><button id="dC" class="danger" ${pl.cannons<=0?'disabled':''}>1💣 (${pl.cannons})</button><button id="dN" ${(pl.swords||pl.cannons)?'disabled':''}>Rien</button></div>`;showOverlay();document.getElementById('dS').onclick=()=>{pl.swords--;log(pl.name+" jette 1⚔️.","combat");idx++;renderPlayers();ask();};document.getElementById('dC').onclick=()=>{pl.cannons--;log(pl.name+" jette 1💣.","combat");idx++;renderPlayers();ask();};document.getElementById('dN').onclick=()=>{idx++;ask();};}ask();}
function startCombat(a,d,done){offerShield(a,d,()=>{hideOverlay();done();},()=>resolveCombat(a,d,done));}
function offerShield(a,d,onCancel,onFight){const shielders=[a,d].filter(x=>x.shields>0);if(!shielders.length){onFight();return;}let i=0;function ask(){if(i>=shielders.length){onFight();return;}const pl=shielders[i];const m=document.getElementById('modal');m.innerHTML=`<h2>🛡️ Bouclier des Mers</h2><p>${pl.name} a ${pl.shields} bouclier(s). L'utiliser pour annuler ce combat ?</p><div class="btnrow"><button id="uS">Utiliser</button><button id="nS" class="sec">Combattre</button></div>`;showOverlay();document.getElementById('uS').onclick=()=>{pl.shields--;log("🛡️ "+pl.name+" utilise son bouclier !","bless");renderPlayers();onCancel();};document.getElementById('nS').onclick=()=>{i++;ask();};}ask();}
function resolveCombat(a,d,done){
  const fa=Math.random()*6|0,fd=Math.random()*6|0;const FA=COMBAT_FACES[fa],FD=COMBAT_FACES[fd];let pa=power(a),pd=power(d);
  if(!FA.supreme){pa+=(FA.sword||0)+(FA.cannon||0)*3;}if(!FD.supreme){pd+=(FD.sword||0)+(FD.cannon||0)*3;}
  const m=document.getElementById('modal');
  m.innerHTML=`<h2>⚔️ Abordage !</h2><div class="combatGrid"><div class="fighter" style="border-color:${a.color}"><h3 style="color:${a.color}">${a.emoji} ${a.name}</h3><div class="muted">${a.cannons}💣 ${a.swords}⚔️${a.furyBonus?' +💥':''} · ${FA.e} ${FA.n}</div><div class="pw">${FA.supreme?'👑 SUP':pa}</div></div><div class="vs">VS</div><div class="fighter" style="border-color:${d.color}"><h3 style="color:${d.color}">${d.emoji} ${d.name}</h3><div class="muted">${d.cannons}💣 ${d.swords}⚔️${d.furyBonus?' +💥':''} · ${FD.e} ${FD.n}</div><div class="pw">${FD.supreme?'👑 SUP':pd}</div></div></div>`;
  let winner=null,loser=null;
  if(FA.supreme&&!FD.supreme){winner=a;loser=d;}else if(FD.supreme&&!FA.supreme){winner=d;loser=a;}else if(FA.supreme&&FD.supreme){m.innerHTML+='<p>🤝 Double Suprématie — Égalité !</p>';}else if(pa>pd){winner=a;loser=d;}else if(pd>pa){winner=d;loser=a;}else{m.innerHTML+='<p>🤝 Égalité !</p>';}
  if(winner){const stolen=[];if(loser.gold>0){loser.gold--;winner.gold++;stolen.push('1🪙');}if(loser.swords>0){loser.swords--;winner.swords++;stolen.push('1⚔️');}if(loser.cannons>0){loser.cannons--;winner.cannons++;stolen.push('1💣');}m.innerHTML+=`<p>🏆 <b style="color:${winner.color}">${winner.name}</b> remporte le combat !${stolen.length?' Butin : '+stolen.join(' '):' (rien à voler)'}</p>`;log("⚔️ "+winner.name+" bat "+loser.name+" ! "+(stolen.join(' ')||'rien')+".","combat");particles('⚔️',10);}
  a.furyBonus=0;d.furyBonus=0;renderPlayers();
  m.innerHTML+='<div class="btnrow"><button id="cCb">Continuer</button></div>';showOverlay();document.getElementById('cCb').onclick=()=>{hideOverlay();done();};
}
function finishPlayer(p){p.done=true;p.pos=0;log("🏆 "+p.name+" rentre au port — "+score(p)+" points !","treasure");particles('🏆',18);placeShip(p);renderPlayers();if(players.every(x=>x.done)){endGame();return;}endTurn();}
function endGame(){
  gameOver=true;const sorted=[...players].sort((a,b)=>score(b)-score(a));const m=document.getElementById('modal');
  m.innerHTML=`<h2>🏴‍☠️ Fin de la Partie !</h2><p>Les capitaines rentrent au port...</p>${sorted.map((p,i)=>`<div class="finalRow ${i===0?'win':''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'🔹'} <b style="color:${p.color}">${p.emoji} ${p.name}</b> — <b>${score(p)} pts</b><span class="muted">⚔️${p.swords} 💣${p.cannons} 🪙${p.gold} 💎${p.treasures.reduce((s,t)=>s+(t.pts||0)*(t.count||1),0)}</span></div>`).join('')}<div class="btnrow"><button id="nG">🏴 Nouvelle Partie</button></div>`;
  showOverlay();document.getElementById('nG').onclick=()=>{hideOverlay();showSetup();};updateActionButtons();
}
function showOverlay(){document.getElementById('overlay').classList.remove('hidden');}
function hideOverlay(){document.getElementById('overlay').classList.add('hidden');}
function toggleMobileLog(){const ml=document.getElementById('mobileLog');ml.style.display=ml.style.display==='flex'?'none':'flex';}
function checkMobile(){document.getElementById('logToggle').style.display=window.innerWidth<=680?'block':'none';}
window.addEventListener('resize',checkMobile);
window.addEventListener('load',()=>{computeCellPositions();buildBoard();highlightCell();checkMobile();showSetup();});
</script>
</body>
</html>
